name: numerics-ci

# Phase 0 deliverable (work-plan §8 Q2): run the toolkit test suite on every push
# or pull request that touches numerics/. Failed tests block merges (work-plan §5).

on:
  push:
    paths:
      - "numerics/**"
      - ".github/workflows/numerics-ci.yml"
  pull_request:
    paths:
      - "numerics/**"
      - ".github/workflows/numerics-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        working-directory: numerics
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install toolkit + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests
        run: pytest -v
