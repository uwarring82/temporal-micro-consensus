<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540"
     font-family="Helvetica, Arial, sans-serif" font-size="15">
  <title>Comparison geometry; multipartite is not redundancy</title>
  <desc>Schematic (type a) for the first Harbour View, framework section. Top panel: nested spatial hierarchy of the consensus reading (L_source inside L_apparatus inside L_comparison). Bottom panels: side-by-side contrast of an anti-redundant entanglement-enhanced state, in which no proper fragment carries the record R, against a redundant consensus state in which many fragments each carry R. Source-file-pinned vector graphic; no operating-point claim; no parameter values.</desc>

  <text x="450" y="32" text-anchor="middle" font-size="19" font-weight="bold">
    Comparison geometry; multipartite &#8800; redundant
  </text>

  <text x="42" y="68" font-size="13" fill="#444" font-style="italic">
    Spatial hierarchy of the consensus reading
  </text>

  <rect x="40" y="82" width="820" height="150" fill="#eef5ff" stroke="#1f6feb"
        stroke-width="1.5" rx="6"/>
  <text x="56" y="105" font-size="14" fill="#1f6feb" font-weight="bold">
    L<tspan baseline-shift="sub" font-size="11">comparison</tspan>
  </text>

  <rect x="160" y="118" width="580" height="98" fill="#fff" stroke="#0a7f3f"
        stroke-width="1.5" rx="6"/>
  <text x="176" y="138" font-size="14" fill="#0a7f3f" font-weight="bold">
    L<tspan baseline-shift="sub" font-size="11">apparatus</tspan>
  </text>

  <rect x="370" y="148" width="200" height="58" fill="#fef3c7" stroke="#b45309"
        stroke-width="1.5" rx="4"/>
  <text x="470" y="184" text-anchor="middle" font-size="14" fill="#b45309" font-weight="bold">
    L<tspan baseline-shift="sub" font-size="11">source</tspan>
  </text>

  <line x1="40" y1="262" x2="860" y2="262" stroke="#ccc" stroke-width="1"/>

  <text x="450" y="295" text-anchor="middle" font-size="14" fill="#444" font-style="italic">
    Multipartite &#8800; redundant: which fragments carry the record R?
  </text>

  <text x="225" y="330" text-anchor="middle" font-size="15" font-weight="bold">
    Anti-redundant
  </text>
  <text x="225" y="350" text-anchor="middle" font-size="13" fill="#444">
    (e.g., entanglement-enhanced)
  </text>
  <ellipse cx="225" cy="430" rx="170" ry="62" stroke="#a52a2a" stroke-width="2"
           fill="#fce4e4"/>
  <text x="225" y="402" text-anchor="middle" font-size="18" font-style="italic" fill="#a52a2a">
    &#936;<tspan baseline-shift="sub" font-size="12">total</tspan>
  </text>
  <g stroke="#a52a2a" stroke-width="1" fill="#fff">
    <circle cx="125" cy="438" r="14"/>
    <circle cx="170" cy="450" r="14"/>
    <circle cx="225" cy="456" r="14"/>
    <circle cx="280" cy="450" r="14"/>
    <circle cx="325" cy="438" r="14"/>
  </g>
  <text x="225" y="510" text-anchor="middle" font-size="13" fill="#444">
    no proper fragment carries R
  </text>

  <line x1="450" y1="312" x2="450" y2="520" stroke="#ccc" stroke-width="1"/>

  <text x="675" y="330" text-anchor="middle" font-size="15" font-weight="bold">
    Redundant
  </text>
  <text x="675" y="350" text-anchor="middle" font-size="13" fill="#444">
    (consensus state)
  </text>

  <g font-size="11" text-anchor="middle">
    <circle cx="540" cy="430" r="24" fill="#dcfce7" stroke="#0a7f3f" stroke-width="1.5"/>
    <text x="540" y="427" font-weight="bold" fill="#0a7f3f" font-size="12">&#10003; R</text>
    <text x="540" y="465">F<tspan baseline-shift="sub" font-size="9">1</tspan></text>

    <circle cx="603" cy="430" r="24" fill="#dcfce7" stroke="#0a7f3f" stroke-width="1.5"/>
    <text x="603" y="427" font-weight="bold" fill="#0a7f3f" font-size="12">&#10003; R</text>
    <text x="603" y="465">F<tspan baseline-shift="sub" font-size="9">2</tspan></text>

    <circle cx="666" cy="430" r="24" fill="#dcfce7" stroke="#0a7f3f" stroke-width="1.5"/>
    <text x="666" y="427" font-weight="bold" fill="#0a7f3f" font-size="12">&#10003; R</text>
    <text x="666" y="465">F<tspan baseline-shift="sub" font-size="9">3</tspan></text>

    <text x="720" y="434" font-size="20">···</text>

    <circle cx="775" cy="430" r="24" fill="#dcfce7" stroke="#0a7f3f" stroke-width="1.5"/>
    <text x="775" y="427" font-weight="bold" fill="#0a7f3f" font-size="12">&#10003; R</text>
    <text x="775" y="465">F<tspan baseline-shift="sub" font-size="9">N</tspan></text>
  </g>
  <text x="675" y="510" text-anchor="middle" font-size="13" fill="#444">
    many fragments each carry R
  </text>

  <text x="450" y="532" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    Structural schematic &#8212; no operating points, no parameter values.
  </text>
</svg>
