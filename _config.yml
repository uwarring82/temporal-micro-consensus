# GitHub Pages (Jekyll) configuration — serves the repository as a documentation site.
# The site is built from the current `main`; the landing page (index.md) lists the
# most recent version of each artefact. Inter-document .md links are rewritten to .html
# by GitHub Pages' jekyll-relative-links plugin (enabled by default).
#
# Page chrome: custom _layouts/default.html, built on the T(h)reehouse +EC corporate
# design system (assets pinned in assets/ from threehouse-plus-ec/cd-rules at tag
# cd-v1.7.1 / commit ee01c80; see assets/SOURCE.md). No GitHub Pages theme is set
# (no `theme:` key) — the rendering invariant from cd-rules blueprint §12 is
# "Markdown source + tokens.css + documented build method", and the build method
# here is the manual _layouts/default.html that imports assets/tokens.css.

title: Temporal Micro Consensus
description: >-
  Consensus-Emergence of Classical Proper Time — a Local-Stewardship research
  framework, with Breakwater Ledger classifications, Sail commentaries, and
  Harbour Views.

# Project-pages baseurl. The Pages site is served from
# https://uwarring82.github.io/temporal-micro-consensus/ — the `/temporal-micro-consensus`
# prefix must be applied to every absolute path the layout emits, which is what the
# `relative_url` Liquid filter does. Without this, the primary-nav links in
# `_layouts/default.html` (which use absolute paths like `/docs/tutorial.html`)
# would 404 on the live site.
baseurl: /temporal-micro-consensus

# This is a prose/documentation repo — we never intend to use Liquid templating.
# 'lax' makes Jekyll render incidental brace sequences in the Markdown literally
# instead of failing the whole build on them (defence against math/notation braces).
liquid:
  error_mode: lax

# Apply the layout to every page (the artefact .md files carry no front matter).
defaults:
  - scope:
      path: ""
    values:
      layout: default

# Keep non-content files out of the built site (per-layer licence texts are served
# from the repo, not the web). The `assets/` folder is intentionally NOT excluded —
# the layout references its files (tokens.css, emblem-*.svg, wordmark-*.svg).
# The root `LICENCE` (split declaration) IS served so the colophon link resolves.
exclude:
  - LICENSE-MIT
  - LICENSE-CC-BY-SA-4.0
  - LICENSE-CC-BY-NC-SA-4.0
  - CITATION.cff
  - .gitignore
  - _config.yml
